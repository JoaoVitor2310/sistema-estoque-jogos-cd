networks:
  sistema-estoque-cd:
    name: sistema-estoque-cd

services:
  app-cd:
    container_name: app-cd
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres-cd
      - redis-cd
    networks:
      - sistema-estoque-cd
    ports:
      - "5173:5173" # Vite HMR (dev)
    entrypoint: /usr/local/bin/entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres-cd:
    container_name: db-cd
    image: postgres:15
    restart: always
    volumes:
      - ./docker/postgres/data-cd:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - sistema-estoque-cd

  redis-cd:
    container_name: redis-cd
    image: redis:7-alpine
    restart: always
    networks:
      - sistema-estoque-cd

  web-cd:
    container_name: web-server-cd
    image: nginx:stable-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "170:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app-cd
    networks:
      - sistema-estoque-cd
