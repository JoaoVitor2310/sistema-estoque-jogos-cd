name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Formatação ──────────────────────────────────────────────────────
  # Roda em paralelo com os demais — não precisa de extensões nem do .env.
  lint:
    name: Pint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Pint (format check)
        run: ./vendor/bin/pint --test

  # ── Job 2: Análise estática ───────────────────────────────────────────────
  analyse:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql, mbstring, xml, bcmath, zip
          coverage: none

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --configuration=phpstan.neon --memory-limit=512M

  # ── Job 3: Testes ─────────────────────────────────────────────────────────
  # Sobe um PostgreSQL nativo do GitHub Actions e sobrescreve as variáveis de
  # conexão do .env (que aponta para "postgres-cd", o hostname do Docker local).
  test:
    name: Pest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pgsql, pdo_pgsql, mbstring, xml, bcmath, zip
          coverage: none

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Configure CI database
        run: |
          # .env — usado pelo artisan (migrate, key:generate, etc.)
          sed -i '/^DB_HOST=/d; /^DB_PORT=/d; /^DB_DATABASE=/d; /^DB_USERNAME=/d; /^DB_PASSWORD=/d' .env
          printf '\nDB_HOST=127.0.0.1\nDB_PORT=5432\nDB_DATABASE=testing\nDB_USERNAME=testing\nDB_PASSWORD=testing\n' >> .env

          # phpunit.xml — usado pelo PHPUnit/Pest (sobrescreve .env via putenv)
          sed -i 's|name="DB_HOST" value="[^"]*"|name="DB_HOST" value="127.0.0.1"|' phpunit.xml
          sed -i 's|name="DB_DATABASE" value="[^"]*"|name="DB_DATABASE" value="testing"|' phpunit.xml
          sed -i 's|name="DB_USERNAME" value="[^"]*"|name="DB_USERNAME" value="testing"|' phpunit.xml
          sed -i 's|name="DB_PASSWORD" value="[^"]*"|name="DB_PASSWORD" value="testing"|' phpunit.xml

      - name: Run migrations
        run: php artisan migrate --force

      - name: Pest
        run: php artisan test --no-coverage
